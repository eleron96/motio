worker_processes auto;

events { worker_connections 2048; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  client_header_buffer_size 16k;
  large_client_header_buffers 8 64k;

  # --- Gzip compression ---
  gzip on;
  gzip_types application/json application/javascript text/css text/plain text/html;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_comp_level 5;

  # --- Rate limiting ---
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

	  # CORS allowlist.
	  # In production the app is same-origin, so CORS is mostly for local dev
	  # (frontend on :5173 talking to gateway on :8080). We do NOT reflect any
	  # arbitrary Origin to avoid cross-origin data exposure.
	  map $http_origin $cors_origin {
	    default "";
	    "~^https://motio\\.nikog\\.net$" $http_origin;
	    "~^http://localhost:5173$" $http_origin;
	    "~^http://127\\.0\\.0\\.1:5173$" $http_origin;
	    "~^http://host\\.docker\\.internal:5173$" $http_origin;
	  }

  map $http_x_forwarded_proto $external_scheme {
    default $scheme;
    "~*https" https;
  }

  upstream auth_upstream {
    server auth:9999;
    keepalive 16;
  }

  upstream rest_upstream {
    server rest:3000;
    keepalive 16;
  }

  upstream functions_upstream {
    server functions:9000;
    keepalive 16;
  }

  upstream realtime_upstream {
    server realtime:4000;
    keepalive 16;
  }

  upstream backup_upstream {
    server backup:7000;
    keepalive 16;
  }

  server {
    listen 8080;
    client_max_body_size 20m;

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /health {
      default_type text/plain;
      add_header Cache-Control "no-store";
      return 200 "ok\n";
    }

    location /verify {
      proxy_pass http://auth_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /auth/v1/callback {
      # If OAuth callback state is stale/missing, GoTrue returns 400 JSON.
      # Redirect users back to /auth instead of showing raw backend payload.
      proxy_intercept_errors on;
      error_page 400 401 403 =302 /auth?error=oauth_callback_failed&error_code=bad_oauth_state&error_description=OAuth+session+expired.+Please+sign+in+again.;

      # OAuth callback responses can include large auth/session cookies.
      # Avoid 502 "upstream sent too big header" from Nginx.
      proxy_buffer_size 128k;
      proxy_buffers 8 128k;
      proxy_busy_buffers_size 256k;

      # Normalize Keycloak redirect URL to browser-facing origin.
      proxy_redirect http://keycloak:8080/ $external_scheme://$host/;
      proxy_redirect http://host.docker.internal:8081/ $external_scheme://$host/;
      proxy_redirect http://localhost:8081/ $external_scheme://$host/;

      proxy_pass http://auth_upstream/callback;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

	    location /auth/v1/ {
	      limit_req zone=auth_limit burst=20 nodelay;

	      if ($request_method = OPTIONS) {
	        add_header 'Access-Control-Allow-Origin' $cors_origin always;
	        add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,PATCH,DELETE,OPTIONS' always;
	        add_header 'Access-Control-Allow-Headers' $http_access_control_request_headers always;
	        add_header 'Access-Control-Max-Age' 86400 always;
	        add_header 'Vary' 'Origin' always;
	        return 204;
	      }

	      add_header 'Access-Control-Allow-Origin' $cors_origin always;
	      add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,PATCH,DELETE,OPTIONS' always;
	      add_header 'Access-Control-Allow-Headers' $http_access_control_request_headers always;
	      add_header 'Access-Control-Expose-Headers' 'content-range,content-length' always;
	      add_header 'Vary' 'Origin' always;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Credentials;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Expose-Headers;
      # OAuth callback responses can include large auth/session cookies.
      # Avoid 502 "upstream sent too big header" from Nginx.
      proxy_buffer_size 128k;
      proxy_buffers 8 128k;
      proxy_busy_buffers_size 256k;

      # Normalize Keycloak redirect URL to browser-facing origin.
      proxy_redirect http://keycloak:8080/ $external_scheme://$host/;
      proxy_redirect http://host.docker.internal:8081/ $external_scheme://$host/;
      proxy_redirect http://localhost:8081/ $external_scheme://$host/;

      proxy_pass http://auth_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

	    location /rest/v1/ {
	      limit_req zone=api_limit burst=50 nodelay;

	      if ($request_method = OPTIONS) {
	        add_header 'Access-Control-Allow-Origin' $cors_origin always;
	        add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,PATCH,DELETE,OPTIONS' always;
	        add_header 'Access-Control-Allow-Headers' $http_access_control_request_headers always;
	        add_header 'Access-Control-Max-Age' 86400 always;
	        add_header 'Vary' 'Origin' always;
	        return 204;
	      }

	      add_header 'Access-Control-Allow-Origin' $cors_origin always;
	      add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,PATCH,DELETE,OPTIONS' always;
	      add_header 'Access-Control-Allow-Headers' $http_access_control_request_headers always;
	      add_header 'Access-Control-Expose-Headers' 'content-range,content-length' always;
	      add_header 'Vary' 'Origin' always;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Credentials;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Expose-Headers;

      proxy_pass http://rest_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

	    location /functions/v1/ {
	      limit_req zone=api_limit burst=50 nodelay;

	      if ($request_method = OPTIONS) {
	        add_header 'Access-Control-Allow-Origin' $cors_origin always;
	        add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,PATCH,DELETE,OPTIONS' always;
	        add_header 'Access-Control-Allow-Headers' $http_access_control_request_headers always;
	        add_header 'Access-Control-Max-Age' 86400 always;
	        add_header 'Vary' 'Origin' always;
	        return 204;
	      }

	      add_header 'Access-Control-Allow-Origin' $cors_origin always;
	      add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,PATCH,DELETE,OPTIONS' always;
	      add_header 'Access-Control-Allow-Headers' $http_access_control_request_headers always;
	      add_header 'Access-Control-Expose-Headers' 'content-range,content-length' always;
	      add_header 'Vary' 'Origin' always;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Credentials;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Expose-Headers;

      proxy_pass http://functions_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

	    location /realtime/v1/ {
	      if ($request_method = OPTIONS) {
	        add_header 'Access-Control-Allow-Origin' $cors_origin always;
	        add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,PATCH,DELETE,OPTIONS' always;
	        add_header 'Access-Control-Allow-Headers' $http_access_control_request_headers always;
	        add_header 'Access-Control-Max-Age' 86400 always;
	        add_header 'Vary' 'Origin' always;
	        return 204;
	      }

	      add_header 'Access-Control-Allow-Origin' $cors_origin always;
	      add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,PATCH,DELETE,OPTIONS' always;
	      add_header 'Access-Control-Allow-Headers' $http_access_control_request_headers always;
	      add_header 'Access-Control-Expose-Headers' 'content-range,content-length' always;
	      add_header 'Vary' 'Origin' always;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Credentials;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Expose-Headers;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      # Realtime auth is query/token based; forwarding bulky browser cookies
      # can trigger 431 in Cowboy and break websocket connect.
      proxy_set_header Cookie "";
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;

      proxy_pass http://realtime_upstream/socket/;
      proxy_set_header Host realtime-dev.supabase.co;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

	    location /backup/ {
	      if ($request_method = OPTIONS) {
	        add_header 'Access-Control-Allow-Origin' $cors_origin always;
	        add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,PATCH,DELETE,OPTIONS' always;
	        add_header 'Access-Control-Allow-Headers' $http_access_control_request_headers always;
	        add_header 'Access-Control-Max-Age' 86400 always;
	        add_header 'Vary' 'Origin' always;
	        return 204;
	      }

	      add_header 'Access-Control-Allow-Origin' $cors_origin always;
	      add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,PATCH,DELETE,OPTIONS' always;
	      add_header 'Access-Control-Allow-Headers' $http_access_control_request_headers always;
	      add_header 'Access-Control-Expose-Headers' 'content-range,content-length' always;
	      add_header 'Vary' 'Origin' always;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Credentials;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Expose-Headers;

      proxy_pass http://backup_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      default_type text/plain;
      add_header Cache-Control "no-store";
      return 200 "Supabase gateway is running. Use /auth/v1, /rest/v1, /realtime/v1, /functions/v1, /backup.\n";
    }
  }
}
